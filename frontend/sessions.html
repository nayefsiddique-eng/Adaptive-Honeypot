<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAGE — Sessions Database</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .timeline-container {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border: 1px solid rgba(0, 245, 255, 0.1);
      border-radius: 4px;
      margin: 10px 0;
    }
    
    .timeline-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      padding-left: 20px;
    }
    .timeline-list::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 5px;
      bottom: 5px;
      width: 2px;
      background: rgba(0, 245, 255, 0.15);
    }
    
    .timeline-item {
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .timeline-item::after {
      content: "";
      position: absolute;
      left: -18px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-cyan);
      box-shadow: 0 0 6px var(--accent-cyan);
    }
    
    .timeline-meta {
      font-family: var(--font-hud);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    .timeline-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-cyan);
    }
    .timeline-detail {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- 1. HEADER -->
    <header class="hud-header">
      <a href="index.html" class="hud-logo">
        <span class="hud-logo-icon">🛡️</span>
        <div class="hud-logo-text">
          <h1>MIRAGE</h1>
          <span>AI Adaptive Deception</span>
        </div>
      </a>
      
      <nav>
        <ul class="hud-nav">
          <li class="hud-nav-item"><a href="index.html">Portal</a></li>
          <li class="hud-nav-item"><a href="dashboard.html">SOC Cockpit</a></li>
          <li class="hud-nav-item active"><a href="sessions.html">Attacker Profiles</a></li>
          <li class="hud-nav-item"><a href="intel.html">Threat Intel</a></li>
        </ul>
      </nav>
    </header>

    <!-- 2. SESSIONS DATABASE -->
    <section class="glass-card">
      <h3>📟 COCKPIT SESSION DB</h3>
      <div class="table-wrapper">
        <table class="cyber-table">
          <thead>
            <tr>
              <th>Session ID</th>
              <th>IP Address</th>
              <th>Country</th>
              <th>Attack Count</th>
              <th>Risk Score</th>
              <th>Deception Score</th>
              <th>Chain Name</th>
              <th>Depth</th>
              <th>Last Seen</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="sessionsBody">
            <tr>
              <td colspan="10" class="loading-text" style="text-align: center;">Retrieving active attacker session histories...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script>
    let openSessionId = null;

    async function loadSessions() {
      const sessions = await fetchSessions();
      renderSessions(sessions);
    }

    function renderSessions(sessions) {
      const tbody = document.getElementById("sessionsBody");
      if (!sessions.length) {
        tbody.innerHTML = `<tr><td colspan="10" class="loading-text" style="text-align: center;">No recorded session history.</td></tr>`;
        return;
      }

      let html = "";
      sessions.forEach(sess => {
        const truncId = sess.session_id.substring(0, 8);
        const col = riskColor(sess.risk_score);
        const deceptionScore = sess.deception_score_avg ? sess.deception_score_avg.toFixed(2) : "0.00";
        
        let statusBadge = `<span class="badge" style="background:rgba(0, 255, 136, 0.12); color:var(--accent-green); border:1px solid var(--accent-green);">Active</span>`;
        if (sess.is_active === false) {
          statusBadge = `<span class="badge" style="background:rgba(78, 97, 120, 0.12); color:var(--text-muted); border:1px solid var(--text-muted);">Closed</span>`;
        }

        const chainStr = sess.attack_chain_name
          ? `<span class="badge" style="background:rgba(255, 107, 43, 0.1); color:var(--accent-orange); border:1px solid var(--accent-orange);">${sess.attack_chain_name.toUpperCase().replace(/_/g, ' ')}</span>`
          : `<span style="color:var(--text-muted);">None</span>`;

        html += `
          <tr style="cursor:pointer;" onclick="toggleSession('${sess.session_id}')">
            <td style="font-family:var(--font-hud); font-weight:700; color:var(--accent-cyan);">#${truncId}</td>
            <td><strong>${sess.ip_address}</strong></td>
            <td>${sess.country || 'Unknown'}</td>
            <td style="font-family:var(--font-hud); font-size:14px; font-weight:700;">${sess.attack_count}</td>
            <td><strong style="color:${col};">${sess.risk_score}</strong></td>
            <td style="font-family:var(--font-hud); font-size:14px; font-weight:700;">${deceptionScore}</td>
            <td>${chainStr}</td>
            <td style="font-family:var(--font-hud);">${sess.interaction_depth}/4</td>
            <td style="color:var(--text-secondary);">${new Date(sess.last_seen || sess.first_seen).toLocaleTimeString()}</td>
            <td>${statusBadge}</td>
          </tr>
          <tr id="timelineRow_${sess.session_id}" class="hidden">
            <td colspan="10">
              <div class="timeline-container" id="timelineBox_${sess.session_id}">
                <div class="loading-text">Loading sequential timeline details...</div>
              </div>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    async function toggleSession(sessionId) {
      const row = document.getElementById(`timelineRow_${sessionId}`);
      const box = document.getElementById(`timelineBox_${sessionId}`);
      
      if (openSessionId === sessionId) {
        row.classList.add("hidden");
        openSessionId = null;
        return;
      }

      if (openSessionId) {
        const prev = document.getElementById(`timelineRow_${openSessionId}`);
        if (prev) prev.classList.add("hidden");
      }

      openSessionId = sessionId;
      row.classList.remove("hidden");
      
      box.innerHTML = `<div class="loading-text">Extracting sequential interaction timeline delta records...</div>`;
      
      const timeline = await fetchBehaviorTimeline(sessionId);
      renderTimeline(box, timeline);
    }

    function renderTimeline(container, timeline) {
      if (!timeline.length) {
        container.innerHTML = `<div class="loading-text">No timeline trace logs found.</div>`;
        return;
      }

      let itemsHtml = "";
      timeline.forEach(t => {
        const delta = t.delta_seconds || 0;
        const mitreStr = t.mitre_technique ? `MITRE ID: ${t.mitre_technique}` : "MITRE: None";
        
        itemsHtml += `
          <div class="timeline-item">
            <div class="timeline-meta">+${delta}s — ${mitreStr}</div>
            <div class="timeline-title">${t.attack_type.toUpperCase().replace(/_/g, ' ')}</div>
            <div class="timeline-detail">Adaptive State: <strong class="text-green">${t.deception_state.toUpperCase()}</strong> | Risk Index: <strong style="color:${riskColor(t.risk_score)}">${t.risk_score}</strong></div>
          </div>
        `;
      });

      container.innerHTML = `
        <div style="font-family:var(--font-hud); font-weight:700; color:var(--accent-cyan); margin-bottom:12px; font-size:12px; letter-spacing:1px; text-transform:uppercase;">Attacker Interaction Delta Timeline</div>
        <div class="timeline-list">
          ${itemsHtml}
        </div>
      `;
    }

    document.addEventListener("DOMContentLoaded", loadSessions);
  </script>
</body>
</html>
