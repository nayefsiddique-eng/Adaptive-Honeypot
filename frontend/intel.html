<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRAGE — Threat Intelligence</title>
  
  <!-- Leaflet CDNs -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .intel-layout {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .map-container {
      height: 380px;
      width: 100%;
      background: #03050a;
      border: 1px solid rgba(0, 245, 255, 0.15);
      border-radius: 4px;
    }

    /* Metric visual design */
    .metrics-hud-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    
    @media (max-width: 768px) {
      .metrics-hud-grid { grid-template-columns: 1fr; }
    }
    
    .metric-hud-card {
      background: rgba(0, 245, 255, 0.015);
      border: 1px solid rgba(0, 245, 255, 0.1);
      border-radius: 4px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .metric-hud-card.highlight {
      border: 2px solid var(--accent-cyan);
      background: rgba(0, 245, 255, 0.04);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.15);
    }
    
    .metric-hud-num {
      font-family: var(--font-hud);
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
    }
    .metric-hud-label {
      font-family: var(--font-hud);
      font-size: 12px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .highlight .metric-hud-label {
      color: var(--accent-cyan);
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- 1. HEADER -->
    <header class="hud-header">
      <a href="index.html" class="hud-logo">
        <span class="hud-logo-icon">🛡️</span>
        <div class="hud-logo-text">
          <h1>MIRAGE</h1>
          <span>AI Adaptive Deception</span>
        </div>
      </a>
      
      <nav>
        <ul class="hud-nav">
          <li class="hud-nav-item"><a href="index.html">Portal</a></li>
          <li class="hud-nav-item"><a href="dashboard.html">SOC Cockpit</a></li>
          <li class="hud-nav-item"><a href="sessions.html">Attacker Profiles</a></li>
          <li class="hud-nav-item active"><a href="intel.html">Threat Intel</a></li>
        </ul>
      </nav>
    </header>

    <main class="intel-layout">
      <!-- 2. SEARCH BAR -->
      <section class="glass-card">
        <h3>🔍 REPUTATION LOOKUP FEED</h3>
        <div style="display: flex; gap: 12px; margin-top: 12px; max-width: 600px;">
          <input type="text" id="ipSearchInput" class="input-control" placeholder="Enter target IP (e.g., 8.8.8.8)..." onkeydown="if(event.key==='Enter') searchLogsByIp()">
          <button onclick="searchLogsByIp()" class="btn btn-primary">Lookup</button>
        </div>
        
        <!-- Log results display container -->
        <div id="logsResultContainer" class="table-wrapper hidden" style="margin-top: 20px; max-height: 250px; overflow-y: auto;">
          <table class="cyber-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Type</th>
                <th>Port</th>
                <th>Protocol</th>
                <th>Risk</th>
                <th>Payload</th>
              </tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
      </section>

      <!-- 3. GEO HEATMAP WITH CLUSTERING -->
      <section class="glass-card">
        <h3>🗺️ REAL-TIME GEOLOCATION THREAT MAP (CLUSTERED)</h3>
        <div id="leafletMap" class="map-container"></div>
      </section>

      <!-- 4. RESEARCH METRICS PANEL -->
      <section class="glass-card">
        <h3>📊 IEEE RESEARCH METRICS HUB</h3>
        <div class="metrics-hud-grid" id="metricsHudGrid">
          <div class="loading-text" style="grid-column: span 2; text-align: center;">Retrieving IEEE evaluation telemetry...</div>
        </div>
      </section>
    </main>

  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script>
    let map = null;
    let markersLayer = null;

    function initMap() {
      map = L.map('leafletMap', {
        center: [20.0, 0.0],
        zoom: 2,
        zoomControl: true,
        attributionControl: false
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18
      }).addTo(map);

      markersLayer = L.markerClusterGroup().addTo(map);
    }

    async function loadMapAndMetrics() {
      // 1. Fetch metrics & populate HUD
      const metrics = await fetchResearchMetrics();
      renderResearchMetrics(metrics);

      // 2. Fetch logs and plot points
      const logs = await fetchLogs();
      plotMapPoints(logs);
    }

    async function searchLogsByIp() {
      const ip = document.getElementById("ipSearchInput").value.trim();
      if (!ip) return;

      const logs = await fetchLogs(ip);
      const container = document.getElementById("logsResultContainer");
      const tbody = document.getElementById("resultBody");

      if (!logs.length) {
        container.classList.remove("hidden");
        tbody.innerHTML = `<tr><td colspan="6" class="loading-text" style="text-align: center;">No local telemetry logs found for IP: ${ip}</td></tr>`;
        return;
      }

      container.classList.remove("hidden");
      let html = "";
      logs.forEach(l => {
        const timeStr = new Date(l.timestamp).toLocaleTimeString();
        html += `
          <tr>
            <td style="color:var(--text-muted); font-family:var(--font-hud);">${timeStr}</td>
            <td><span class="badge badge-${l.attack_type}">${l.attack_type.replace(/_/g, ' ')}</span></td>
            <td>${l.port}</td>
            <td>${l.protocol.toUpperCase()}</td>
            <td><strong style="color:${riskColor(l.risk_score)}">${l.risk_score}</strong></td>
            <td style="font-family:monospace; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${l.raw_payload || 'No payload logged.'}</td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    function plotMapPoints(logs) {
      markersLayer.clearLayers();
      if (logs.error || !logs.length) return;

      const ipGroups = {};
      logs.forEach(log => {
        if (!log.latitude || !log.longitude) return;
        const ip = log.ip_address;
        if (!ipGroups[ip]) {
          ipGroups[ip] = {
            ip,
            latitude: log.latitude,
            longitude: log.longitude,
            count: 0,
            maxRisk: 0,
            city: log.city || "Unknown",
            country: log.country || "Unknown"
          };
        }
        ipGroups[ip].count++;
        ipGroups[ip].maxRisk = Math.max(ipGroups[ip].maxRisk, log.risk_score);
      });

      Object.values(ipGroups).forEach(g => {
        const col = riskColor(g.maxRisk);
        const marker = L.circleMarker([g.latitude, g.longitude], {
          radius: Math.min(8 + g.count * 1.5, 20),
          fillColor: col,
          color: col,
          fillOpacity: 0.5,
          weight: 1
        });

        const pop = `
          <div style="font-family: Space Grotesk, sans-serif; font-size: 11px; color:#fff; line-height: 1.4;">
            <strong>IP: ${g.ip}</strong><br/>
            Location: ${g.city}, ${g.country}<br/>
            Aggregated Risk: <strong style="color:${col}">${g.maxRisk}</strong>
          </div>
        `;
        marker.bindPopup(pop);
        markersLayer.addLayer(marker);
      });
    }

    function renderResearchMetrics(metrics) {
      const grid = document.getElementById("metricsHudGrid");
      if (metrics.error) {
        grid.innerHTML = `<div class="error-text" style="grid-column: span 2; text-align: center;">Failed to retrieve research stats from DB.</div>`;
        return;
      }

      const nm = metrics.new_metrics || {};
      const fields = [
        { label: "Avg Deception Score", value: nm.avg_deception_score ? nm.avg_deception_score.toFixed(2) : "0.00", highlight: true },
        { label: "Chain Detection Rate", value: nm.chain_detection_rate ? (nm.chain_detection_rate * 100).toFixed(0) + "%" : "0%", highlight: true },
        { label: "Total Ingress Attacks", value: metrics.total_attacks || 0 },
        { label: "Unique Attacker Footprints", value: metrics.total_unique_ips || 0 },
        { label: "Detection Accuracy (Ens)", value: (metrics.detection_rate_pct || 0) + "%" },
        { label: "FP Rate Ratio", value: (metrics.false_positive_rate_pct || 0) + "%" },
        { label: "Adaptation Efficiency Ratio", value: (metrics.adaptation_effectiveness_pct || 0) + "%" },
        { label: "IP Reputation Cache Hit Rate", value: nm.intel_cache_hit_rate ? (nm.intel_cache_hit_rate * 100).toFixed(0) + "%" : "0%" },
        { label: "LLM Summary Cache Hit Rate", value: nm.gemini_cache_hit_rate ? (nm.gemini_cache_hit_rate * 100).toFixed(0) + "%" : "0%" },
        { label: "Mean Ingest Latency", value: (metrics.average_response_time_ms || 0).toFixed(1) + "ms" }
      ];

      let html = "";
      fields.forEach(f => {
        const activeClass = f.highlight ? "highlight" : "";
        html += `
          <div class="metric-hud-card ${activeClass}">
            <div class="metric-hud-label">${f.label}</div>
            <div class="metric-hud-num">${f.value}</div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
      initMap();
      loadMapAndMetrics();
    });
  </script>
</body>
</html>
