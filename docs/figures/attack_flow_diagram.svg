<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#0a0f1d"/>
    <text x="30" y="40" font-family="monospace" font-size="18" font-weight="bold" fill="#00f0ff">ATTACK EVENT FLOW TIMELINE</text>
    <text x="30" y="60" font-family="monospace" font-size="11" fill="#64748b">IEEE RESEARCH FIGURE - TRANSACTION PIPELINE STEPS</text>

    <!-- Node 1: Request Ingestion -->
    <rect x="50" y="150" width="100" height="80" rx="6" fill="#131a35" stroke="#00f0ff" stroke-width="1.5"/>
    <text x="100" y="180" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">1. INGESTION</text>
    <text x="100" y="200" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">FastAPI POST</text>
    <text x="100" y="215" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">measure latency</text>

    <!-- Connection -->
    <path d="M 150 190 L 210 190" fill="none" stroke="#00f0ff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Node 2: Extraction -->
    <rect x="210" y="150" width="100" height="80" rx="6" fill="#131a35" stroke="#ff9900" stroke-width="1.5"/>
    <text x="260" y="180" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">2. EXTRACT</text>
    <text x="260" y="200" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">Features parsing</text>
    <text x="260" y="215" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">Heuristics check</text>

    <!-- Connection -->
    <path d="M 310 190 L 370 190" fill="none" stroke="#ff9900" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Node 3: AI Classifier -->
    <rect x="370" y="150" width="100" height="80" rx="6" fill="#131a35" stroke="#af52de" stroke-width="1.5"/>
    <text x="420" y="175" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">3. AI ENGINE</text>
    <text x="420" y="195" font-family="monospace" font-size="9" fill="#00ff88" text-anchor="middle">RF &amp; XGBoost</text>
    <text x="420" y="210" font-family="monospace" font-size="9" fill="#ffcc00" text-anchor="middle">IsoForest (AD)</text>
    <text x="420" y="222" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">MITRE map</text>

    <!-- Connection -->
    <path d="M 470 190 L 530 190" fill="none" stroke="#af52de" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Node 4: Intelligence enrichment -->
    <rect x="530" y="150" width="100" height="80" rx="6" fill="#131a35" stroke="#ffcc00" stroke-width="1.5"/>
    <text x="580" y="180" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">4. ENRICH</text>
    <text x="580" y="200" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">GeoIP coordinates</text>
    <text x="580" y="215" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">Threat IP DBs</text>

    <!-- Connection -->
    <path d="M 630 190 L 690 190" fill="none" stroke="#ffcc00" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Node 5: Adaptation Response -->
    <rect x="690" y="150" width="100" height="80" rx="6" fill="#131a35" stroke="#00ff88" stroke-width="1.5"/>
    <text x="740" y="180" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">5. RESPOND</text>
    <text x="740" y="200" font-family="monospace" font-size="9" fill="#00ff88" text-anchor="middle">Deceptive Action</text>
    <text x="740" y="215" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">Save SQLite log</text>

    <!-- Markers definition -->
    <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="2" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 Z" fill="#00f0ff"/>
        </marker>
    </defs>
    </svg>