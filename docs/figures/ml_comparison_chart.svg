<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#0a0f1d"/>
    <text x="30" y="40" font-family="monospace" font-size="18" font-weight="bold" fill="#00ff88">ML MODEL PERFORMANCE COMPARATIVE METRICS</text>
    <text x="30" y="60" font-family="monospace" font-size="11" fill="#64748b">IEEE RESEARCH FIGURE - ACCURACY, PRECISION, RECALL, F1 COMPARISON</text>

    <!-- Grid lines -->
    <line x1="80" y1="120" x2="720" y2="120" stroke="#232e58" stroke-width="0.5"/>
    <line x1="80" y1="180" x2="720" y2="180" stroke="#232e58" stroke-width="0.5"/>
    <line x1="80" y1="240" x2="720" y2="240" stroke="#232e58" stroke-width="0.5"/>
    <line x1="80" y1="300" x2="720" y2="300" stroke="#232e58" stroke-width="0.5"/>
    <line x1="80" y1="360" x2="720" y2="360" stroke="#64748b" stroke-width="1"/>

    <!-- Y-Axis Labels -->
    <text x="70" y="125" font-family="monospace" font-size="10" fill="#64748b" text-anchor="end">100%</text>
    <text x="70" y="185" font-family="monospace" font-size="10" fill="#64748b" text-anchor="end">80%</text>
    <text x="70" y="245" font-family="monospace" font-size="10" fill="#64748b" text-anchor="end">60%</text>
    <text x="70" y="305" font-family="monospace" font-size="10" fill="#64748b" text-anchor="end">40%</text>
    <text x="70" y="365" font-family="monospace" font-size="10" fill="#64748b" text-anchor="end">0%</text>

    <!-- Group 1: Random Forest -->
    <!-- X = 150 -->
    <rect x="110" y="120.0" width="15" height="240.0" fill="#00ff88"/>
    <rect x="130" y="120.0" width="15" height="240.0" fill="#00f0ff"/>
    <rect x="150" y="120.0" width="15" height="240.0" fill="#ff9900"/>
    <rect x="170" y="120.0" width="15" height="240.0" fill="#af52de"/>
    <text x="147.5" y="380" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">RANDOM FOREST</text>
    <text x="147.5" y="395" font-family="monospace" font-size="9" fill="#00ff88" text-anchor="middle">F1: 100.00%</text>

    <!-- Group 2: XGBoost -->
    <!-- X = 350 -->
    <rect x="310" y="120.0" width="15" height="240.0" fill="#00ff88"/>
    <rect x="330" y="120.0" width="15" height="240.0" fill="#00f0ff"/>
    <rect x="350" y="120.0" width="15" height="240.0" fill="#ff9900"/>
    <rect x="370" y="120.0" width="15" height="240.0" fill="#af52de"/>
    <text x="347.5" y="380" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">XGBOOST</text>
    <text x="347.5" y="395" font-family="monospace" font-size="9" fill="#00ff88" text-anchor="middle">F1: 100.00%</text>

    <!-- Group 3: Isolation Forest -->
    <!-- X = 550 -->
    <rect x="510" y="174.24" width="15" height="185.76" fill="#00ff88"/>
    <rect x="530" y="360.0" width="15" height="0.0" fill="#00f0ff"/>
    <rect x="550" y="360.0" width="15" height="0.0" fill="#ff9900"/>
    <rect x="570" y="360.0" width="15" height="0.0" fill="#af52de"/>
    <text x="547.5" y="380" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">ISOLATION FOREST*</text>
    <text x="547.5" y="395" font-family="monospace" font-size="9" fill="#00ff88" text-anchor="middle">F1: 0.00%</text>

    <!-- Legend -->
    <rect x="650" y="100" width="130" height="120" rx="4" fill="#131a35" stroke="#232e58"/>
    <text x="660" y="120" font-family="monospace" font-size="10" font-weight="bold" fill="#e2e8f0">METRICS LEGEND</text>
    
    <rect x="660" y="135" width="12" height="12" fill="#00ff88"/>
    <text x="680" y="145" font-family="monospace" font-size="9" fill="#e2e8f0">Accuracy</text>
    
    <rect x="660" y="155" width="12" height="12" fill="#00f0ff"/>
    <text x="680" y="165" font-family="monospace" font-size="9" fill="#e2e8f0">Precision</text>
    
    <rect x="660" y="175" width="12" height="12" fill="#ff9900"/>
    <text x="680" y="185" font-family="monospace" font-size="9" fill="#e2e8f0">Recall</text>
    
    <rect x="660" y="195" width="12" height="12" fill="#af52de"/>
    <text x="680" y="205" font-family="monospace" font-size="9" fill="#e2e8f0">F1-Score</text>

    <text x="30" y="415" font-family="monospace" font-size="8" fill="#64748b">*Isolation Forest metrics reflect anomaly classification (separating malicious inputs from unknown background scans).</text>
    </svg>